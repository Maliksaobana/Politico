
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- font-awesome icons --->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google fonts --->
    <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans:ital,wght@0,100..900;1,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <title>Edit Party</title>
</head>
<body>

    <main class="dash_wrapper">
        <aside class="dashboard_menu">
            <button class="menu_close">
                <i class="fa-solid fa-close"></i>
            </button>
            <header class="header_item">
                <div class="header_logo">
                    <span>use</span>
                </div>
                <div class="header_info">
                    <h2>username</h2>
                    <h3>party name</h3>
                    <h4>position</h4>
                    <h5>number of followers</h5>
                </div>
            </header>
            <nav>
                <div class="list_nav">
                    <ul>
                        <li class="politico_menu"><span><i class="fa-solid fa-home"></i></span><a href="../index.html" target="_parent" rel="no-referrer" rel="no-opener">Home</a></li>
                        <li class="politico_menu pol_access"><span><i class="fa-solid fa-handshake"></i></span><a href="./FeedView/index.html" target="_parent" rel="no-referrer" rel="no-opener">Create Position</a></li>
                        <li class="politico_menu active"><span><i class="fa-solid fa-landmark-flag"></i></span><a href="./index.html" target="_parent" rel="no-referrer" rel="no-opener">Party</a></li>
                        
                        <li class="politico_menu"><span><i class="fa-solid fa-check-to-slot"></i></span><a href="../VoteView/index.html" target="_parent" rel="no-referrer" rel="no-opener">Vote</a></li>
                        <li class="politico_menu"><span><i class="fa-regular fa-circle-user"></i></span><a href="../ProfileView/index.html" target="_parent" rel="no-referrer" rel="no-opener">Profile</a></li>
                    </ul>
                </div>
            </nav>
            <div class="sign_out">
                    <button class="log_out">
                        <span>
                            <i class="fa-solid fa-door-open"></i>
                        </span>
                        Log out</button>
            </div>
        </aside>
        <section class="display_main">
            <div class="wrap_head">
                <div class="display_header">
                    <div class="display_logo">
                        <h1>Party</h1>
                    </div>
                    <button class="menu">
                        <i class="fa-solid fa-bars"></i>
                    </button>
                </div>
                <div class="create_party_btn active">
                    <div class="page_info">
                        <h2>Edit Political Party</h2>
                    </div>
                </div>
            </div>

            <!-- create party menu for Admin only -->
             <section class="create_new_party active">
                <form>
                    <div class="create_new_party_info">
                        <div class="create_new_party_form_header">
                            <div class="create_new_party_img">
                                <span>ad</span>
                            </div>
                        </div>
                        <div class="create_new_party_form_info">
                            <div class="user_input">
                                <h5>party name</h5>
                                <div class="edit_mode">
                                    <div class="input_field">
                                        <h1 class="text_field">Name.......</h1>
                                    </div>
                                    <button class="admin_edit_icon">
                                        <i class="fa-solid fa-pencil"></i>
                                    </button
                                    >
                                </div>
                            </div>
                            <div class="user_input">
                                <h5>party Shortname</h5>
                                <div class="edit_mode">
                                    <div class="shortName">
                                        <h1 class="text_field">Example: pdp</h1>
                                    </div>
                                    <button class="shortName_admin_edit_icon">
                                        <i class="fa-solid fa-pencil"></i>
                                    </button
                                    >
                                </div>
                            </div>
                            <div class="user_input">
                                <h5>slogan</h5>
                                <div class="edit_mode">
                                    <div class="input_field">
                                        <h1 class="text_field">we rise and fall together</h1>
                                    </div>
                                    <button class="admin_edit_icon">
                                        <i class="fa-solid fa-pencil"></i>
                                    </button
                                    >
                                </div>
                            </div>
                            <div class="user_input">
                                <h5>color</h5>
                                <div class="edit_mode">
                                    <div class="for_colors">
                                        <h1 class="text_field">Example: #00000, black,.....</h1>
                                    </div>
                                    <button class="color">
                                        <i class="fa-solid fa-pencil"></i>
                                    </button
                                    >
                                </div>
                            </div>
                            <div class="user_input">
                                <h5>motto</h5>
                                <div class="edit_mode">
                                    <div class="input_field">
                                        <h1 class="text_field"></h1>
                                    </div>
                                    <button class="area_icon">
                                        <i class="fa-solid fa-pencil"></i>
                                    </button
                                    >
                                </div>
                            </div>
                        </div>
                        <div class="create_new_party_save_btn">
                            <button class="createParty">Save</button>
                        </div>
                    </div>
                </form>
             </section>
        </section>
    </main>
    
    <script type="module" src="script.js"></script>
</body>
</html>
