<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <!-- font-awesome icons --->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google fonts --->
    <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans:ital,wght@0,100..900;1,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <title>Campaign</title>
</head>
<body>
    <main class="profile_wrapper">
        <div class="profile_header">
            <h1>Create Campaign</h1>
        </div>
        <form>
            <div class="profile_info">
                <div class="profile_form_header">
                    <div class="profile_img">
                        <span>pdp</span>
                    </div>
                    <div class="admin_info">
                        <h1>username</h1>
                        <h2>position</h3>
                        <h3>followers</h3>
                    </div>
                </div>
                <div class="profile_form_info">
                    <div class="user_input">
                        <h5>campaign name</h5>
                        <div class="edit_mode">
                            <div class="input_field">
                                <input type="text">
                            </div>
                            
                        </div>
                    </div>
                    <div class="user_input">
                        <h5>location / venue</h5>
                        <div class="edit_mode">
                            <div class="input_field">
                                <input type="text">
                            </div>
                            
                        </div>
                    </div>
                    <div class="user_input">
                        <h5>state</h5>
                        <div class="edit_mode">
                            <div class="input_field">
                                <input type="text">
                            </div>
                            
                        </div>
                    </div>
                    <div class="user_input">
                        <h5>date</h5>
                        <div class="edit_mode">
                            <div class="input_field">
                                <input type="date" name="" id="">
                            </div>
                            
                        </div>
                    </div>
                </div>
                <div class="profile_save_btn">
                    <button>create</button>
                </div>
            </div>
        </form>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
