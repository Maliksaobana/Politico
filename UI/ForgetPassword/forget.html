<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="forget_wrapper">
        <form>
            <div class="form_wrapper">
                <div class="form_logo">
                    <h1>Politico</h1>
                    <p>“Democracy is not just the right to vote, it is the right <br /> to live in dignity.” Naomi Klein</p>
                </div>
                <div class="form_data">
                    <div class="form_input">
                        <h5>create new password</h5>
                        <div class="input_field">
                            <input type="password" placeholder="enter new password">
                        </div>
                    </div>
                    <div class="form_input">
                        <h5>confirm new password</h5>
                        <div class="input_field">
                            <input class="confirm" type="password" placeholder="confirm new password">
                        </div>
                    </div>
                </div>
                <div class="form_btn">
                    <button class="confirm_btn">Confirm</button>
                </div>
                <div class="form_remark">
                    <h4>“I believe that voting is the first act of building a community as well as building a country.” <br /> John Ensign</h4>
                </div>
            </div>
        </form>
    </div>

    <script type="module" src="forget.js"></script>
</body>
</html>
