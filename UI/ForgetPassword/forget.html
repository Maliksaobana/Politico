<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- google fonts --->
    <link href="https://fonts.googleapis.com/css2?family=Alumni+Sans:ital,wght@0,100..900;1,100..900&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
</head>
<body>
    <div class="forget_wrapper">
        <form>
            <div class="form_wrapper">
                <div class="form_logo">
                    <h1>Politico</h1>
                    <p>“Democracy is not just the right to vote, it is the right <br class="br" /> to live in dignity.” Naomi Klein</p>
                </div>
                <div class="form_data">
                    <div class="form_input">
                        <h5>create new password</h5>
                        <div class="input_field">
                            <input type="password" placeholder="enter new password">
                        </div>
                    </div>
                    <div class="form_input">
                        <h5>confirm new password</h5>
                        <div class="input_field">
                            <input class="confirm" type="password" placeholder="confirm new password">
                        </div>
                    </div>
                </div>
                <div class="form_btn">
                    <button class="confirm_btn"><span class="loader isnotLoading"></span>Confirm</button>
                </div>
                <div class="form_remark">
                    <h4>“I believe that voting is the first act of building a community as well as building a country.” <br class="br_two" /> John Ensign</h4>
                </div>
            </div>
        </form>

        <div class="errModal">
            <h1><i class="fa-regular fa-circle-xmark"></i><span></span></h1>
        </div>
    </div>

    <script type="module" src="forget.js"></script>
</body>
</html>
